name: macOS build (compile-check)

# WHAT A GREEN RUN PROVES:
#   - native/whixp_transport (whixp's required native transport crate)
#     actually cross-compiles for macOS as a .dylib, on real Apple
#     toolchain - previously unverified, since it was only ever built for
#     Windows so far.
#   - The main flutter_rust_bridge crate (rust/, for input injection)
#     builds via cargokit's existing macOS Podfile integration.
#   - `flutter build macos` succeeds end to end: Dart/Flutter code compiles,
#     CocoaPods resolves, the .app bundle is produced.
#
# WHAT A GREEN RUN DOES NOT PROVE (needs a real Mac, not covered here):
#   - That libwhixp_transport.dylib is actually *found* at runtime by
#     whixp's dlopen() call. It's copied into Contents/Frameworks/ below,
#     matching where Flutter's own embedded frameworks live and rely on the
#     runner's existing @executable_path/../Frameworks rpath, but this is
#     unverified - dlopen() only happens when the app actually runs, and
#     Dart FFI dynamic loading isn't a link-time dependency, so a build can
#     succeed even if this placement is wrong.
#   - Screen Recording permission flow (ScreenCaptureKit).
#   - Accessibility permission flow (enigo input injection).
#   - Any actual capture/produce/inject behavior at runtime.
# All of the above require manual testing on real macOS hardware.
#
# No code signing or notarization - the DMG is unsigned, for local team
# testing only via the "latest" pre-release below, not for distribution
# outside the team. Opening it will trigger an unsigned-app Gatekeeper
# warning (right-click -> Open, or System Settings -> Privacy & Security).

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write # needed to create/update the "latest" release

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: dtolnay/rust-toolchain@stable

      - name: Build whixp_transport native library for macOS
        run: |
          cd native/whixp_transport
          cargo build --release
          ls -la target/release/*.dylib

      - name: flutter pub get
        run: flutter pub get

      - name: flutter build macos (debug)
        run: flutter build macos --debug

      - name: Wire whixp_transport.dylib into the built .app
        run: |
          APP_PATH="build/macos/Build/Products/Debug/ringopus_remote_producer.app"
          FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS_DIR"
          cp native/whixp_transport/target/release/libwhixp_transport.dylib "$FRAMEWORKS_DIR/"
          echo "Copied into $FRAMEWORKS_DIR - see the workflow file header for what this does and doesn't prove."

          # whixp's Dart FFI loader does a bare `DynamicLibrary.open("libwhixp_transport.dylib")`
          # on macOS, which resolves via the main binary's LC_RPATH (Flutter's runner already
          # has @executable_path/../Frameworks). That only works if the dylib carries a valid
          # signature - dropping in an unsigned file post-build, after Xcode already ad-hoc
          # signed the .app, leaves both the dylib and the outer bundle's seal invalid. Re-sign
          # both so App Sandbox / Gatekeeper don't have a reason to refuse the dlopen() at runtime.
          echo "Ad-hoc signing the dylib and re-signing the .app bundle..."
          codesign --force --sign - --timestamp=none "$FRAMEWORKS_DIR/libwhixp_transport.dylib"
          codesign --force --deep --sign - --timestamp=none --entitlements macos/Runner/DebugProfile.entitlements "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH" && echo "codesign verify: OK"

      - uses: actions/upload-artifact@v4
        with:
          name: ringopus_remote_producer-macos
          # actions/upload-artifact zips directories itself, preserving the
          # .app bundle structure and permissions - no need to zip it
          # ourselves first, which would just produce a zip-inside-a-zip on
          # download.
          path: build/macos/Build/Products/Debug/ringopus_remote_producer.app
          retention-days: 14

      - name: Package as .dmg
        run: |
          hdiutil create -volname "Ringopus Remote Producer" \
            -srcfolder build/macos/Build/Products/Debug/ringopus_remote_producer.app \
            -ov -format UDZO \
            ringopus_remote_producer-macos.dmg

      - name: Publish/update the "latest" release with the .dmg
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest macOS build (unsigned, testing only)
          # Deliberately not prerelease: true - GitHub's own "latest release"
          # UI/API excludes prereleases by default, which would conflict
          # with this tag literally being named "latest" and defeat the
          # one-click-download goal. The body text below makes clear this
          # isn't a real numbered/signed release.
          # Re-running the workflow updates this same release/asset in place
          # instead of piling up a new release per push - one stable
          # download link at all times: .../releases/latest
          body: |
            Automated unsigned macOS build from commit ${{ github.sha }}.
            Local testing only - see the workflow file for what this build
            does and doesn't prove. Unsigned: expect a Gatekeeper warning on
            first open (right-click -> Open).
          files: ringopus_remote_producer-macos.dmg
