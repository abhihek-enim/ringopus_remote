# libwebrtc prebuilt binary release info.
# See https://github.com/webrtc-sdk/libwebrtc/releases for available versions.
# `download_url` is the base release-download URL; the version tag, asset name
# and `.zip` suffix are appended at configure time by third_party/CMakeLists.txt.
#
# PATCHED FORK (screen-content encoding fix): stock libwebrtc's
# ScreenCapturerTrackSource never overrides is_screencast()/needs_denoising(),
# so it inherits webrtc::VideoTrackSource's camera defaults and desktop capture
# is encoded as camera video (denoiser eligible, no screen-content rate control,
# resolution-drop degradation). This points at a fork of the SAME stock source
# (branched from tag libwebrtc.m144.7559.09, commit 557808919a58...) with a
# 2-line override added to ScreenCapturerTrackSource (is_screencast()=true,
# needs_denoising()=false). Only the Windows x64 asset is rebuilt; macOS is
# unaffected (it sets the flag via videoSourceForScreenCast:YES in the plugin).
#   Fork:   https://github.com/abhihek-enim/libwebrtc
#   Branch: screencast-m144.7559.09   Patch commit: d3ad3bd3b93aab9d6c55b6736bcab102ce0980b9
# REVERT to stock: restore the two values below to
#   binary_version = libwebrtc.m144.7559.09
#   download_url   = https://github.com/webrtc-sdk/libwebrtc/releases/download
[libwebrtc]
binary_version = libwebrtc.m144.7559.09-screencast1
download_url   = https://github.com/abhihek-enim/libwebrtc/releases/download
